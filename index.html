<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Wortgalaxie · German Vocabulary Explorer</title>
<style>

/* ── Google Fonts ─────────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap');

/* ── Design tokens ────────────────────────────────── */
:root,[data-theme="dark"]{
  --bg:#05081a;
  --bg2:#0c1030;
  --sf:rgba(255,255,255,.06);
  --sf2:rgba(255,255,255,.10);
  --sf3:rgba(255,255,255,.15);
  --bd:rgba(255,255,255,.12);
  --bd2:rgba(255,255,255,.22);
  --tx:#eeeadc;
  --tx2:#b0b8d8;
  --tx3:#8890b0;
  --ac:#7ec8ff;
  --acb:rgba(126,200,255,.12);
  --acbd:rgba(126,200,255,.35);
  --btnbg:#2060c0;
  --btnhv:#3070d8;
  --stbg:rgba(255,255,255,.05);
  --stbd:rgba(255,255,255,.10);
  --strbg:rgba(60,20,130,.12);
  --strbd:rgba(130,100,220,.28);
  --hero-glow:rgba(126,200,255,.07);
  /* 3D card shadows */
  --card-shadow:0 4px 0 rgba(0,0,0,.45),0 8px 24px rgba(0,0,0,.35);
  --card-hover-shadow:0 7px 0 rgba(0,0,0,.4),0 14px 32px rgba(0,0,0,.4);
  --card-top:rgba(255,255,255,.07);
  --green:#3ecf70; --blue:#7ec8ff; --amber:#f5c842; --red:#ff7070; --purple:#c0a0ff;
}
[data-theme="light"]{
  --bg:#f5f0e8;
  --bg2:#ebe6d8;
  --sf:rgba(255,255,255,.96);
  --sf2:rgba(255,255,255,.80);
  --sf3:rgba(255,255,255,.65);
  --bd:rgba(40,30,10,.18);
  --bd2:rgba(40,30,10,.32);
  --tx:#0e0c06;
  --tx2:#2e2a1e;
  --tx3:#5a5040;
  --ac:#0d4a90;
  --acb:rgba(13,74,144,.13);
  --acbd:rgba(13,74,144,.38);
  --btnbg:#0d4a90;
  --btnhv:#1558a8;
  --stbg:rgba(255,255,255,.88);
  --stbd:rgba(40,30,10,.14);
  --strbg:rgba(200,185,240,.22);
  --strbd:rgba(110,80,200,.28);
  --hero-glow:rgba(13,74,144,.06);
  --card-shadow:0 4px 0 rgba(0,0,0,.20),0 8px 20px rgba(0,0,0,.12);
  --card-hover-shadow:0 7px 0 rgba(0,0,0,.18),0 14px 28px rgba(0,0,0,.15);
  --card-top:rgba(255,255,255,.95);
  --green:#0f6030; --blue:#0d4a90; --amber:#6a4400; --red:#8c1f1f; --purple:#4a2898;
}

/* ── Reset ────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}

/* ── Body ─────────────────────────────────────────── */
body{
  background:var(--bg);color:var(--tx);
  font-family:'Nunito Sans',system-ui,sans-serif;
  font-size:17px;min-height:100vh;
  padding:0 1.25rem 6rem;
  overflow-x:hidden;
  transition:background .3s,color .3s;
  letter-spacing:.01em;
}

/* ── Ambient background ───────────────────────────── */
#stars{position:fixed;top:0;left:0;width:1px;height:1px;z-index:-3;}
#nebula{
  position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:
    radial-gradient(ellipse 65% 45% at 12% 20%,rgba(55,25,130,.22) 0%,transparent 70%),
    radial-gradient(ellipse 55% 38% at 88% 72%,rgba(15,55,130,.18) 0%,transparent 65%);
}
[data-theme="light"] #nebula,[data-theme="light"] #stars{opacity:0;}
[data-theme="light"] body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent,transparent 28px,rgba(60,50,30,.055) 28px,rgba(60,50,30,.055) 29px);
}

/* ── Layout ───────────────────────────────────────── */
.container{max-width:940px;margin:0 auto;position:relative;z-index:1;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:20px;backdrop-filter:blur(8px);}

/* ── 3D card mixin ────────────────────────────────── */
.card3d{
  background:var(--sf);
  border:1px solid var(--bd);
  border-radius:18px;
  backdrop-filter:blur(8px);
  box-shadow:var(--card-shadow);
  position:relative;
  transition:transform .18s cubic-bezier(.34,1.4,.64,1),box-shadow .18s;
}
.card3d:hover{transform:translateY(-4px);box-shadow:var(--card-hover-shadow);}
.card3d::before{
  content:"";position:absolute;inset:0;
  border-radius:18px;
  background:linear-gradient(160deg,var(--card-top) 0%,transparent 45%);
  pointer-events:none;
}

/* ── Header ───────────────────────────────────────── */
.header{text-align:center;padding:2.8rem 0 1.8rem;position:relative;}
.logo{
  font-family:'Nunito',sans-serif;
  font-size:60px;font-weight:900;
  letter-spacing:-.01em;line-height:1;
}
[data-theme="dark"] .logo{
  text-shadow:0 0 60px rgba(126,200,255,.4),0 0 120px rgba(126,200,255,.15);
}
.logo span{color:var(--ac);}
.logo-sub{
  font-size:11px;letter-spacing:.20em;text-transform:uppercase;
  color:var(--tx3);font-family:'Nunito Sans',sans-serif;margin-top:5px;font-weight:700;
}
.tagline{font-size:17px;color:var(--tx2);margin-top:9px;font-weight:700;}
.free-badge{
  display:inline-flex;align-items:center;gap:7px;
  font-size:14px;padding:6px 18px;border-radius:20px;
  border:1.5px solid rgba(80,210,100,.45);
  color:var(--green);margin-top:11px;
  background:rgba(50,150,70,.12);
  font-weight:800;letter-spacing:.01em;
}

/* ── Theme toggle ─────────────────────────────────── */
.theme-btn{
  position:absolute;right:0;top:2.8rem;
  background:var(--sf2);border:1.5px solid var(--bd2);
  border-radius:22px;padding:8px 18px;
  cursor:pointer;font-family:'Nunito Sans',sans-serif;
  font-size:15px;font-weight:700;color:var(--tx2);
  transition:background .15s,border-color .15s;
}
.theme-btn:hover{background:var(--sf3);border-color:var(--ac);color:var(--ac);}

/* ── Level pills ──────────────────────────────────── */
.level-row{display:flex;gap:9px;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;}
.lvl-btn{
  padding:9px 22px;border-radius:22px;
  border:1.5px solid var(--bd2);
  background:transparent;color:var(--tx2);
  font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;transition:all .16s;letter-spacing:.01em;
}
.lvl-btn:hover,.lvl-btn.active{
  background:var(--acb);border-color:var(--ac);color:var(--ac);
  transform:translateY(-2px);
  box-shadow:0 3px 12px rgba(126,200,255,.2);
}
.lvl-btn.active{font-weight:900;}

/* ── Search card ──────────────────────────────────── */
.search-card{padding:1.5rem 1.5rem 1.2rem;margin-bottom:1.3rem;}
.search-row{display:flex;gap:10px;flex-wrap:wrap;}
.inp,.sel{
  padding:12px 18px;border:1.5px solid var(--bd2);
  border-radius:13px;background:var(--sf2);
  color:var(--tx);font-family:'Nunito Sans',sans-serif;
  font-size:17px;font-weight:700;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.inp{flex:1;min-width:140px;}
.inp::placeholder{color:var(--tx3);font-weight:500;}
.inp:focus,.sel:focus{
  border-color:var(--ac);
  box-shadow:0 0 0 3px var(--acb);
}
.sel{min-width:200px;max-width:235px;cursor:pointer;font-size:16px;}
.sel option{background:var(--bg);color:var(--tx);}
.go-btn{
  padding:12px 28px;border-radius:13px;border:none;
  background:var(--btnbg);color:#fff;
  font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;
  cursor:pointer;
  transition:background .15s,transform .12s;
  white-space:nowrap;
  box-shadow:0 4px 0 rgba(0,0,0,.35);
  letter-spacing:.01em;
}
.go-btn:hover{background:var(--btnhv);transform:translateY(-2px);box-shadow:0 6px 0 rgba(0,0,0,.3);}
.go-btn:active{transform:translateY(1px);box-shadow:0 2px 0 rgba(0,0,0,.4);}
.cat-sugg{overflow:hidden;max-height:0;transition:max-height .4s,opacity .3s;opacity:0;}
.cat-sugg.open{max-height:240px;opacity:1;}
.chips,.sug-chips{display:flex;flex-wrap:wrap;gap:8px;}
.chips{margin-top:13px;}
.chip,.sug-chip{
  padding:6px 15px;border-radius:20px;font-size:15px;font-weight:700;
  font-family:'Nunito Sans',sans-serif;border:1.5px solid var(--bd2);
  color:var(--tx2);cursor:pointer;background:transparent;transition:all .13s;
}
.sug-chip{border-color:var(--acbd);color:var(--ac);}
.sug-chip:hover,.chip:hover{
  background:var(--acb);color:var(--tx);
  border-color:var(--acbd);transform:translateY(-1px);
}
.sug-intro{font-size:14px;color:var(--tx3);margin-bottom:9px;margin-top:13px;font-weight:700;}

/* ── Word Ticker / Marquee ────────────────────────── */
.word-ticker{
  overflow:hidden;white-space:nowrap;
  margin:0 0 1.6rem;
  padding:.5rem 0;
  border-top:1px solid var(--bd);
  border-bottom:1px solid var(--bd);
  mask-image:linear-gradient(to right,transparent 0%,black 8%,black 92%,transparent 100%);
}
.word-ticker-inner{
  display:inline-block;
  animation:ticker 38s linear infinite;
  font-size:15px;font-weight:600;color:var(--tx3);
  letter-spacing:.04em;
}
.word-ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── Hero area (empty state) ──────────────────────── */
.hero-area{
  display:flex;gap:2.8rem;align-items:center;
  padding:2.2rem 0 2.8rem;flex-wrap:wrap;
}
.hero-preview{
  flex:0 0 auto;
  background:var(--hero-glow);
  border:1.5px solid var(--bd);border-radius:22px;
  padding:.6rem;backdrop-filter:blur(4px);
  box-shadow:var(--card-shadow);
}
.hero-preview svg{width:272px;height:170px;display:block;}
.hero-text{flex:1;min-width:240px;}
.hero-title{
  font-family:'Nunito',sans-serif;font-weight:900;
  font-size:32px;line-height:1.2;margin-bottom:.8rem;
}
[data-theme="dark"] .hero-title{color:var(--ac);}
[data-theme="light"] .hero-title{color:var(--tx);}
.hero-desc{font-size:17px;color:var(--tx2);line-height:1.7;margin-bottom:1.3rem;font-weight:600;}
.hero-stats{display:flex;gap:1rem;flex-wrap:wrap;}
.hstat{
  display:flex;flex-direction:column;align-items:center;
  background:var(--sf2);border:1.5px solid var(--bd);
  border-radius:14px;padding:.7rem 1.2rem;min-width:68px;
  box-shadow:0 3px 0 rgba(0,0,0,.22);
}
.hstat-n{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--ac);line-height:1;}
.hstat-l{font-size:12px;color:var(--tx3);margin-top:3px;font-weight:700;}

/* ── Topic index ──────────────────────────────────── */
.topic-index{margin-bottom:2.2rem;}
.ti-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.1rem;padding-bottom:.7rem;
  border-bottom:1.5px solid var(--bd);
}
.ti-title{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:var(--tx);}
.ti-count{font-size:14px;color:var(--tx3);font-weight:700;}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:14px;}
.topic-card{
  background:var(--sf);border:1.5px solid var(--bd);
  border-radius:18px;padding:1.1rem 1.2rem;
  cursor:pointer;transition:all .18s;
  position:relative;overflow:hidden;
  box-shadow:var(--card-shadow);
}
.topic-card::before{
  content:"";position:absolute;inset:0;border-radius:18px;
  background:linear-gradient(160deg,var(--card-top) 0%,transparent 40%);
  pointer-events:none;
}
.topic-card::after{
  content:"";position:absolute;inset:0;border-radius:18px;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,var(--acb),transparent 70%);
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.topic-card:hover{
  border-color:var(--acbd);
  transform:translateY(-5px);
  box-shadow:var(--card-hover-shadow);
}
.topic-card:hover::after{opacity:1;}
.topic-card:focus{outline:2.5px solid var(--ac);outline-offset:3px;}
.tc-level{
  display:inline-block;font-size:10px;font-weight:800;
  padding:2px 9px;border-radius:5px;letter-spacing:.08em;
  background:var(--acb);color:var(--ac);border:1px solid var(--acbd);
  font-family:'Nunito Sans',sans-serif;margin-bottom:5px;
}
.tc-chap{display:block;font-size:11px;color:var(--tx3);font-weight:700;letter-spacing:.03em;margin-bottom:6px;}
.tc-name{font-family:'Nunito',sans-serif;font-size:21px;font-weight:900;color:var(--tx);line-height:1.2;margin-bottom:5px;}
.tc-words{font-size:13px;color:var(--tx3);font-weight:700;}
[data-theme="light"] .tc-name{color:#0e0c06;}
[data-theme="light"] .tc-words{color:#5a5040;}
[data-theme="light"] .tc-chap{color:#5a5040;}
[data-theme="light"] .nf-t{color:#0e0c06;}
[data-theme="light"] .nf-lv{color:#5a5040;}

/* ── Not-found ────────────────────────────────────── */
.nf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-top:18px;text-align:left;}
.nf-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:11px 15px;cursor:pointer;transition:all .14s;box-shadow:var(--card-shadow);}
.nf-card:hover{background:var(--acb);border-color:var(--acbd);transform:translateY(-3px);}
.nf-lv{font-size:11px;font-weight:700;color:var(--tx3);margin-bottom:4px;}
.nf-t{font-size:18px;font-weight:800;color:var(--tx);}

/* ── Result header ────────────────────────────────── */
.result-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.3rem;flex-wrap:wrap;gap:10px;}
.result-title{font-family:'Nunito',sans-serif;font-size:38px;font-weight:900;color:var(--tx);}
[data-theme="light"] .result-title{color:#0e0c06;}
.result-sub{font-size:15px;color:var(--tx3);margin-top:4px;font-weight:700;}
[data-theme="light"] .result-sub{color:#5a5040;}
.btn-ghost{padding:9px 22px;border-radius:13px;border:1.5px solid var(--bd2);background:transparent;color:var(--tx);font-family:'Nunito Sans',sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:background .13s;}
.btn-ghost:hover{background:var(--sf2);}

/* ── Learn banner ─────────────────────────────────── */
.learn-banner{margin-bottom:1.6rem;}
.learn-steps{display:flex;gap:10px;flex-wrap:wrap;}
.learn-step{
  flex:1;min-width:200px;
  display:flex;align-items:flex-start;gap:14px;
  padding:1rem 1.2rem;
  border-radius:16px;
  border:1.5px solid var(--bd);
  background:var(--sf);
  position:relative;
  overflow:hidden;
}
.learn-step::before{
  content:"";position:absolute;inset:0;
  border-radius:16px;
  background:linear-gradient(135deg,var(--card-top) 0%,transparent 60%);
  pointer-events:none;
}
.step-icon{
  font-size:30px;flex-shrink:0;
  width:52px;height:52px;display:flex;align-items:center;justify-content:center;
  border-radius:12px;
  background:var(--acb);border:1.5px solid var(--acbd);
}
.step-num{
  font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;
  color:var(--ac);letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:4px;
}
.step-title{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:var(--tx);line-height:1.2;}
[data-theme="light"] .step-title{color:#0e0c06;}
.step-desc{font-size:13px;color:var(--tx2);font-weight:600;line-height:1.5;margin-top:4px;}
[data-theme="light"] .step-desc{color:#2e2a1e;}

/* ── Legend ───────────────────────────────────────── */
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:1.1rem;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:16px;font-weight:700;color:var(--tx2);}
.ldot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}

/* ── Word web ─────────────────────────────────────── */
.web-outer{margin-bottom:1.6rem;}
.web-controls{display:flex;gap:7px;justify-content:flex-end;margin-bottom:7px;align-items:center;}
.wc-btn{padding:6px 15px;border-radius:9px;font-size:17px;font-weight:700;border:1.5px solid var(--bd2);background:var(--sf);color:var(--tx2);cursor:pointer;font-family:'Nunito Sans',sans-serif;transition:all .13s;}
.wc-btn:hover{background:var(--acb);color:var(--tx);border-color:var(--acbd);}
.web-hint{font-size:13px;color:var(--tx3);margin-right:auto;font-weight:700;}
.web-card{padding:1.1rem;overflow:hidden;touch-action:none;cursor:grab;position:relative;}
.web-card:active{cursor:grabbing;}
.web-card svg{display:block;width:100%;overflow:visible;transform-origin:50% 50%;}
.wn{cursor:pointer;transform-box:fill-box;transform-origin:50% 50%;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.wn:hover{transform:scale(1.14);filter:drop-shadow(0 0 10px rgba(126,200,255,.6));}
.vn{cursor:pointer;transform-box:fill-box;transform-origin:50% 50%;transition:transform .18s cubic-bezier(.34,1.56,.64,1);}
.vn:hover{transform:scale(1.24);filter:drop-shadow(0 0 8px rgba(126,200,255,.65));}

/* ═══════════════════════════════════════════════════════
   SECTION BLOCKS — each section has its own identity
══════════════════════════════════════════════════════ */
.section-block{
  border-radius:20px;margin-bottom:1.8rem;
  overflow:hidden;
  box-shadow:var(--card-shadow);
}

/* Section label strip */
.sec-label-strip{
  display:flex;align-items:center;gap:12px;
  padding:.8rem 1.4rem;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;
  letter-spacing:.02em;
  border-bottom:1.5px solid var(--bd);
}
.sec-label-icon{font-size:20px;}
.sec-label-text{flex:1;}

/* Sentences block — Electric Blue theme */
.sents-block{background:rgba(10,30,90,.55);border:1.5px solid rgba(126,200,255,.22);}
[data-theme="light"] .sents-block{background:rgba(225,237,255,.88);border:1.5px solid rgba(13,74,144,.22);}
.blue-strip{background:rgba(126,200,255,.12);color:var(--blue);}
[data-theme="light"] .blue-strip{background:rgba(13,74,144,.10);color:#0d4a90;}
.sents-block .sent-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(126,200,255,.12);
  border-radius:13px;padding:15px 22px;margin:0 1rem 10px;
}
.sents-block .sent-card:first-child{margin-top:1rem;}
.sents-block .sent-card:last-child{margin-bottom:1rem;}
[data-theme="light"] .sents-block .sent-card{background:rgba(255,255,255,.94);border-color:rgba(13,74,144,.16);}
.sent-de{font-size:20px;font-weight:800;color:var(--tx);margin-bottom:5px;font-family:'Nunito',sans-serif;}
.sent-en{font-size:15px;color:var(--tx2);font-style:italic;font-weight:600;}
[data-theme="light"] .sent-de{color:#0e0c06;}
[data-theme="light"] .sent-en{color:#2e2a1e;}
.shuf-btn{margin-left:auto;padding:5px 16px;border-radius:20px;font-size:15px;font-weight:800;font-family:'Nunito Sans',sans-serif;border:1.5px solid var(--acbd);background:var(--acb);color:var(--ac);cursor:pointer;transition:all .13s;}
.shuf-btn:hover{background:var(--btnbg);color:#fff;border-color:var(--btnbg);}

/* Story block — Deep Purple theme */
.story-block{background:rgba(40,10,100,.45);border:1.5px solid rgba(192,160,255,.22);}
[data-theme="light"] .story-block{background:rgba(238,230,255,.88);border:1.5px solid rgba(74,40,152,.20);}
.purple-strip{background:rgba(192,160,255,.12);color:var(--purple);}
[data-theme="light"] .purple-strip{background:rgba(74,40,152,.10);color:#4a2898;}
.story-card{background:transparent;border:none;padding:1.2rem 1.4rem;}
.story-cols{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;align-items:start;}
@media(max-width:620px){.story-cols{grid-template-columns:1fr;gap:1rem;}}
.story-col-hd{font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;letter-spacing:.10em;text-transform:uppercase;margin-bottom:.7rem;padding-bottom:.4rem;border-bottom:1.5px solid var(--bd);}
.story-col-de .story-col-hd{color:var(--purple);}
.story-col-en .story-col-hd{color:var(--tx3);}
[data-theme="light"] .story-col-de .story-col-hd{color:#4a2898;}
[data-theme="light"] .story-col-en .story-col-hd{color:#5a5040;}
.story-txt{font-size:18px;font-weight:700;line-height:2.0;color:var(--tx);font-family:'Nunito Sans',sans-serif;}
.story-txt .hl{color:var(--purple);border-bottom:2px dotted rgba(192,160,255,.5);font-weight:900;}
[data-theme="light"] .story-txt{color:#0e0c06;}
[data-theme="light"] .story-txt .hl{color:#4a2898;}
.story-en{font-size:16px;color:var(--tx2);font-style:italic;line-height:1.95;font-weight:600;}
[data-theme="light"] .story-en{color:#2e2a1e;}

/* Word grid block — Amber / Gold theme */
.word-block{background:rgba(60,35,0,.45);border:1.5px solid rgba(245,200,66,.18);}
[data-theme="light"] .word-block{background:rgba(255,248,220,.80);border:1.5px solid rgba(140,100,0,.22);}
.amber-strip{background:rgba(245,200,66,.10);color:var(--amber);}
[data-theme="light"] .amber-strip{background:rgba(180,130,0,.10);color:#6a4400;}
[data-theme="light"] .amber-strip .sec-label-text,[data-theme="light"] .amber-strip .sec-label-icon{color:#6a4400;}
[data-theme="light"] .word-card{background:#ffffff;border-color:rgba(40,30,10,.18);}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:12px;padding:1.2rem 1.2rem 1.4rem;}
.word-card{
  background:var(--sf2);border:1.5px solid var(--bd);
  border-radius:16px;padding:14px 16px;
  transition:transform .16s,border-color .16s,box-shadow .16s;
  box-shadow:0 3px 0 rgba(0,0,0,.3),0 6px 16px rgba(0,0,0,.18);
  position:relative;
}
.word-card::before{content:"";position:absolute;inset:0;border-radius:16px;background:linear-gradient(160deg,var(--card-top) 0%,transparent 40%);pointer-events:none;}
.word-card:hover{transform:translateY(-4px);border-color:var(--bd2);box-shadow:0 6px 0 rgba(0,0,0,.28),0 10px 24px rgba(0,0,0,.22);}
.type-badge{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:6px;margin-bottom:7px;letter-spacing:.05em;font-family:'Nunito Sans',sans-serif;}
/* Ensure badge text is always dark enough on its bg */
[data-theme="light"] .type-badge{filter:saturate(1.3) brightness(.75);}

.word-de{font-family:'Nunito',sans-serif;font-size:21px;font-weight:900;color:var(--tx);margin-bottom:3px;}
.word-art{font-weight:700;color:var(--tx2);}
.word-en{font-size:15px;color:var(--tx2);font-style:italic;font-weight:700;}
.vpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.vp{font-size:12px;font-weight:800;background:var(--acb);border:1.5px solid var(--acbd);color:var(--ac);padding:3px 10px;border-radius:12px;}
.vp em{color:var(--tx3);font-weight:600;font-style:normal;}
/* Light mode overrides: enforce dark text on light card bg */
[data-theme="light"] .word-de{color:#0e0c06;}
[data-theme="light"] .word-art{color:#2e2a1e;}
[data-theme="light"] .word-en{color:#2e2a1e;}
[data-theme="light"] .vp{color:#0d4a90;background:rgba(13,74,144,.10);border-color:rgba(13,74,144,.35);}
[data-theme="light"] .vp em{color:#5a5040;}

/* ═══════════════════════════════════════════════════════
   LEDGER — Synonyme & Antonyme
   Identity: clean dual-column accounting ledger, green/red split
══════════════════════════════════════════════════════ */
.ledger-block{
  background:rgba(10,28,18,.55);
  border:1.5px solid rgba(62,207,112,.18);
}
[data-theme="light"] .ledger-block{background:rgba(220,250,232,.88);border-color:rgba(15,96,48,.20);}
.ledger-block .sec-label-strip{background:rgba(62,207,112,.10);color:var(--green);}
[data-theme="light"] .ledger-block .sec-label-strip{background:rgba(15,96,48,.10);color:#0f6030;}

/* Table structure */
.sa-table{padding:.4rem 1.4rem 1.4rem;display:flex;flex-direction:column;gap:0;}
.sa-thead{
  display:grid;grid-template-columns:180px 1fr 1fr;
  padding:.7rem 0 .7rem;
  border-bottom:2px solid var(--bd);
  margin-bottom:.2rem;
}
.sa-th{
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;
  letter-spacing:.07em;text-transform:uppercase;
}
.word-th{color:var(--tx3);}
.syn-th{color:var(--green);padding-left:12px;}
.ant-th{color:var(--red);padding-left:12px;}
[data-theme="light"] .word-th{color:#5a5040;}
[data-theme="light"] .syn-th{color:#0f6030;}
[data-theme="light"] .ant-th{color:#8c1f1f;}
.sa-trow{
  display:grid;grid-template-columns:180px 1fr 1fr;
  align-items:start;
  padding:.9rem 0;
  border-bottom:1px solid var(--bd);
  gap:0 8px;
}
.sa-trow:last-child{border-bottom:none;}
.sa-trow:hover{background:rgba(255,255,255,.025);}
[data-theme="light"] .sa-trow:hover{background:rgba(0,0,0,.025);}
.sa-td{padding:0;}
.word-td{
  display:flex;flex-direction:column;gap:4px;
  padding-right:16px;
  border-right:1.5px solid var(--bd);
}
.sa-word-label{
  font-family:'Nunito',sans-serif;font-size:19px;font-weight:900;
  color:var(--tx);line-height:1.1;
}
[data-theme="light"] .sa-word-label{color:#0e0c06;}
.sa-type-lbl{
  font-size:11px;font-weight:800;letter-spacing:.06em;
  color:var(--tx3);text-transform:uppercase;
  font-family:'Nunito Sans',sans-serif;
}
[data-theme="light"] .sa-type-lbl{color:#5a5040;}
.syn-td,.ant-td{
  display:flex;flex-wrap:wrap;align-items:flex-start;
  gap:6px;padding-left:12px;
}
.ltag-s,.ltag-a{
  display:inline-flex;flex-direction:column;
  font-size:13px;font-weight:700;
  padding:4px 12px 5px;border-radius:10px;
  font-family:'Nunito Sans',sans-serif;line-height:1.2;
}
.ltag-s{background:rgba(62,207,112,.14);border:1.5px solid rgba(62,207,112,.32);color:var(--green);}
.ltag-a{background:rgba(255,112,112,.14);border:1.5px solid rgba(255,112,112,.32);color:var(--red);}
[data-theme="light"] .ltag-s{color:#0f6030;background:rgba(15,96,48,.10);border-color:rgba(15,96,48,.32);}
[data-theme="light"] .ltag-a{color:#8c1f1f;background:rgba(140,31,31,.10);border-color:rgba(140,31,31,.32);}
.ltag-s em,.ltag-a em{font-size:11px;color:var(--tx3);font-style:normal;font-weight:600;margin-top:2px;}
[data-theme="light"] .ltag-s em,[data-theme="light"] .ltag-a em{color:#5a5040;}
@media(max-width:650px){
  .sa-thead{display:none;}
  .sa-trow{grid-template-columns:1fr;gap:8px;}
  .word-td{border-right:none;border-bottom:1px solid var(--bd);padding-bottom:8px;padding-right:0;}
  .syn-td,.ant-td{padding-left:0;}
  .syn-td::before{content:"Synonyme";display:block;width:100%;font-size:11px;font-weight:800;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
  .ant-td::before{content:"Antonyme";display:block;width:100%;font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
}


.score-pips{display:flex;gap:5px;align-items:center;font-size:18px;color:var(--tx3);}
.score-pips.done{color:#3ecf70;}

/* ═══════════════════════════════════════════════════════
   DOJO — Vocabulary Challenge
   Identity: dark dojo/duel aesthetic, red + gold accents
══════════════════════════════════════════════════════ */
.dojo-block{
  background:rgba(30,8,8,.65);
  border:1.5px solid rgba(255,112,70,.22);
}
[data-theme="light"] .dojo-block{background:rgba(255,240,235,.88);border-color:rgba(160,60,20,.22);}
.dojo-header{
  display:flex;align-items:center;gap:14px;
  padding:1rem 1.5rem 1rem;
  background:rgba(255,100,60,.10);
  border-bottom:1.5px solid rgba(255,112,70,.22);
  flex-wrap:wrap;
}
.dojo-icon{font-size:28px;flex-shrink:0;}
.dojo-title{
  font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;
  color:#ff8060;letter-spacing:.01em;
}
[data-theme="light"] .dojo-title{color:#c03020;}
.dojo-tagline{font-size:13px;font-weight:800;color:rgba(255,128,96,.65);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;font-family:'Nunito Sans',sans-serif;}
.dojo-sub{font-size:14px;color:var(--tx3);font-weight:600;margin-top:4px;}
.game-score{font-size:18px;font-weight:900;color:#ff8060;margin-left:auto;font-family:'Nunito',sans-serif;}
.game-board{display:flex;flex-direction:column;gap:13px;padding:1rem 1.4rem 1.4rem;}
.game-row{display:flex;align-items:center;gap:13px;flex-wrap:wrap;}
.game-prompt{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;color:var(--tx);min-width:130px;flex:0 0 auto;}
[data-theme="light"] .game-prompt{color:#0e0c06;}
.game-hint{font-size:13px;color:var(--tx3);font-style:italic;display:block;margin-top:2px;font-weight:600;}
.pool{display:flex;flex-wrap:wrap;gap:10px;margin:0 1.4rem 1rem;padding:1rem;background:rgba(255,255,255,.03);border-radius:14px;border:1px solid rgba(255,112,70,.15);}
.dz{
  flex:1;min-width:155px;min-height:56px;
  border:2px dashed rgba(255,112,70,.4);border-radius:14px;
  padding:8px 14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  transition:border-color .15s,background .15s;
  background:rgba(255,100,60,.06);
}
.dz.over{border-color:#ff8060;filter:brightness(1.3);}
.dz.ok{border-color:#3ecf70;background:rgba(40,150,70,.14);border-style:solid;}
.dz.bad{border-color:#ff4040;background:rgba(200,40,40,.14);animation:shake .38s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-7px)}50%{transform:translateX(7px)}}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.dz-ph{font-size:14px;font-weight:700;color:var(--tx3);pointer-events:none;}
.dz-meaning{font-size:14px;color:#3ecf70;font-style:italic;margin-top:3px;text-align:center;font-weight:700;}
.chip-placed{font-size:17px;font-family:'Nunito',sans-serif;color:#5ee080;font-weight:800;}
.dc{
  padding:9px 18px;border-radius:11px;font-size:17px;font-weight:800;
  font-family:'Nunito Sans',sans-serif;
  background:rgba(255,112,70,.14);
  border:1.5px solid rgba(255,112,70,.35);
  color:var(--tx);cursor:grab;user-select:none;
  transition:transform .15s,opacity .15s;touch-action:none;
}
[data-theme="light"] .dc{color:#18140a;background:rgba(200,60,20,.12);border-color:rgba(160,60,20,.38);}
.dc:hover{transform:scale(1.08);box-shadow:0 4px 12px rgba(255,100,60,.25);}
.dc.dragging{opacity:.35;cursor:grabbing;}
.dc.placed{opacity:.28;pointer-events:none;border-style:dashed;}

/* Dojo quote */
.quote-box{text-align:center;padding:1.2rem 1.6rem;background:rgba(255,100,60,.06);border-bottom:1.5px solid rgba(255,112,70,.15);}
.quote-de{font-family:'Nunito',sans-serif;font-size:19px;font-weight:800;color:#ff9070;line-height:1.6;}
[data-theme="light"] .quote-de{color:#c03020;}
.quote-en{font-size:15px;color:var(--tx3);font-style:italic;margin-top:6px;font-weight:600;}

/* Completion banner */
.completion-banner{
  display:flex;align-items:center;gap:18px;
  padding:1.2rem 1.5rem;margin:1rem 1.4rem;
  background:rgba(40,160,80,.18);border:1.5px solid rgba(62,207,112,.4);
  border-radius:16px;flex-wrap:wrap;
  box-shadow:0 4px 0 rgba(0,0,0,.22);
}
.completion-banner span{font-size:34px;}
.completion-banner div{flex:1;font-size:17px;color:var(--tx);font-weight:700;}
.completion-banner strong{display:block;font-family:'Nunito',sans-serif;font-size:22px;color:#3ecf70;font-weight:900;}

/* ═══════════════════════════════════════════════════════
   TERMINAL — Word Explorer
   Identity: code terminal / hacker aesthetic
══════════════════════════════════════════════════════ */
.terminal-block{
  background:#0a0f0a;
  border:1.5px solid rgba(62,207,112,.25);
  font-family:'Courier New',Courier,monospace;
}
[data-theme="light"] .terminal-block{background:#1a2a1a;border-color:rgba(62,207,112,.35);}
.terminal-topbar{
  display:flex;align-items:center;gap:8px;
  padding:.7rem 1.2rem;
  background:rgba(255,255,255,.06);
  border-bottom:1px solid rgba(62,207,112,.18);
}
.tb-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.tb-title{
  margin-left:8px;
  font-size:13px;font-weight:700;
  color:rgba(62,207,112,.7);
  letter-spacing:.04em;font-family:'Courier New',monospace;
}
.terminal-body{padding:1rem 1.3rem 1.4rem;}
.term-prompt{
  font-size:14px;color:rgba(62,207,112,.6);
  margin-bottom:1rem;letter-spacing:.03em;
}
.term-prompt::before{content:"$ ";color:#3ecf70;font-weight:900;}
.explorer-pool{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:.6rem;}
.ex-chip{
  padding:8px 18px;border-radius:8px;font-size:16px;font-weight:700;
  font-family:'Courier New',monospace;cursor:pointer;border:1px solid transparent;
  transition:transform .12s,box-shadow .12s;letter-spacing:.03em;
}
.ex-chip:hover{transform:scale(1.07);box-shadow:0 3px 10px rgba(0,0,0,.4);}
.ex-chip.sel{box-shadow:0 0 0 3px #3ecf70;}
.wd-panel{
  padding:22px 24px;border-radius:14px;margin-top:12px;
  animation:wdIn .22s ease both;
  border:1.5px solid rgba(62,207,112,.25) !important;
  font-family:'Nunito Sans',sans-serif;
}
@keyframes wdIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:translateY(0)}}
.wd-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:10px;}
.wd-word{font-family:'Nunito',sans-serif;font-size:32px;font-weight:900;color:#3ecf70;}
.wd-art{font-size:22px;color:#7ec8ff;font-weight:800;}
.wd-en{font-size:20px;color:#7ec8ff;font-weight:800;margin-bottom:12px;}
.wd-def{font-size:17px;font-weight:700;color:var(--tx);margin-bottom:6px;padding-left:18px;position:relative;}
.wd-def::before{content:"·";position:absolute;left:0;color:#3ecf70;}
.wd-ex{font-size:14px;color:var(--tx2);font-style:italic;margin-top:4px;padding-left:18px;font-weight:600;}
.wd-vt{font-size:12px;font-weight:800;color:var(--tx3);margin:13px 0 8px;letter-spacing:.08em;}
.wd-vpills{display:flex;flex-wrap:wrap;gap:7px;}
.wd-vp{font-size:13px;font-weight:700;background:rgba(62,207,112,.12);border:1px solid rgba(62,207,112,.3);color:#3ecf70;padding:4px 12px;border-radius:12px;}
.wd-vp em{color:var(--tx3);font-weight:500;font-style:normal;}

/* ── State ────────────────────────────────────────── */
.state{text-align:center;padding:4.5rem 1rem;}
.state-icon{width:68px;height:68px;margin:0 auto 22px;opacity:.2;}
.state p{font-size:23px;color:var(--tx3);font-weight:800;}
.state p small{display:block;font-size:16px;margin-top:9px;font-weight:600;}

/* ── Mobile ───────────────────────────────────────── */
@media(max-width:620px){
  .logo{font-size:42px;}
  .result-title{font-size:28px;}
  .hero-area{flex-direction:column;gap:1.5rem;}
  .hero-preview svg{width:220px;height:138px;}
  .hero-title{font-size:26px;}
  .topic-grid{grid-template-columns:repeat(auto-fill,minmax(144px,1fr));}
  .search-row{flex-direction:column;}
  .sel{max-width:100%;}
  .theme-btn{position:static;margin-bottom:1rem;}
  .header{padding:1.6rem 0 1.1rem;}
  /* sa-table mobile handled inside ledger CSS */
  .word-grid{grid-template-columns:repeat(auto-fill,minmax(144px,1fr));}
}


/* ── AI Fallback UI ───────────────────────────────── */
.api-bar{
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  padding:1rem 1.4rem;
  margin-bottom:1.3rem;
  border-radius:18px;
  border:1.5px solid rgba(126,200,255,.22);
  background:rgba(10,30,90,.5);
}
[data-theme="light"] .api-bar{background:rgba(220,235,255,.75);border-color:rgba(13,74,144,.22);}
.api-bar-icon{font-size:22px;flex-shrink:0;}
.api-bar-label{font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--ac);flex:1;min-width:180px;}
.api-bar-label small{display:block;font-size:12px;color:var(--tx3);font-weight:600;margin-top:2px;}
.api-inp{
  flex:1;min-width:200px;padding:9px 14px;
  border:1.5px solid var(--bd2);border-radius:10px;
  background:var(--sf2);color:var(--tx);
  font-family:'Nunito Sans',sans-serif;font-size:14px;font-weight:700;
  outline:none;letter-spacing:.04em;
}
.api-inp::placeholder{color:var(--tx3);font-weight:500;letter-spacing:.02em;}
.api-inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acb);}
[data-theme="light"] .api-inp{color:#0e0c06;}
.api-save-btn{
  padding:9px 18px;border-radius:10px;border:none;
  background:var(--btnbg);color:#fff;
  font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;
}
.api-save-btn:hover{background:var(--btnhv);transform:translateY(-1px);}
.api-status{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap;}
.api-status.set{background:rgba(62,207,112,.15);color:var(--green);border:1px solid rgba(62,207,112,.3);}
.api-status.unset{background:rgba(255,112,70,.12);color:#ff8060;border:1px solid rgba(255,112,70,.25);}

/* Loading state */
.ai-loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:5rem 2rem;text-align:center;gap:1.2rem;
}
.ai-spinner{
  width:56px;height:56px;border-radius:50%;
  border:3px solid var(--bd);
  border-top-color:var(--ac);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-loading-title{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;color:var(--tx);}
.ai-loading-sub{font-size:15px;color:var(--tx3);font-weight:600;max-width:340px;line-height:1.6;}
.ai-loading-steps{display:flex;flex-direction:column;gap:6px;margin-top:.5rem;}
.ai-step{
  display:flex;align-items:center;gap:10px;
  font-size:14px;font-weight:700;color:var(--tx3);
  padding:6px 16px;border-radius:10px;
  border:1px solid var(--bd);background:var(--sf);
  transition:all .3s;
}
.ai-step.active{color:var(--ac);border-color:var(--acbd);background:var(--acb);}
.ai-step.done{color:var(--green);border-color:rgba(62,207,112,.3);background:rgba(62,207,112,.08);}
.ai-step-icon{font-size:16px;flex-shrink:0;}

/* AI generated badge on result */
.ai-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:800;letter-spacing:.06em;
  padding:3px 10px;border-radius:20px;
  background:rgba(126,200,255,.12);border:1px solid rgba(126,200,255,.3);
  color:var(--ac);text-transform:uppercase;margin-left:8px;
  vertical-align:middle;
}
.cached-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:800;letter-spacing:.06em;
  padding:3px 10px;border-radius:20px;
  background:rgba(62,207,112,.10);border:1px solid rgba(62,207,112,.25);
  color:var(--green);text-transform:uppercase;margin-left:8px;
  vertical-align:middle;
}

</style>
</head>
<body>
<div id="stars"></div><div id="nebula"></div>
<div class="container">

  <div class="header">
    <button class="theme-btn" onclick="toggleTheme()" id="tbtn">&#9728;&#65039; Light</button>
    <div class="logo">Wort<span>galax</span>ie</div>
    <div class="logo-sub">German Vocabulary Explorer</div>
    <div class="tagline">Interactive word webs &middot; A1 to B2 &middot; All topics free</div>
    <div class="free-badge">&#10022; No account &nbsp;&middot;&nbsp; No API key &nbsp;&middot;&nbsp; Works offline</div>
  </div>

  <div class="level-row">
    <button class="lvl-btn" onclick="setLevel('A1')">A1 &middot; Beginner</button>
    <button class="lvl-btn active" onclick="setLevel('A2')">A2 &middot; Elementary</button>
    <button class="lvl-btn" onclick="setLevel('B1')">B1 &middot; Intermediate</button>
    <button class="lvl-btn" onclick="setLevel('B2')">B2 &middot; Upper-Intermediate</button>
  </div>

  <div class="search-card card">

   story:'Mein Tagesablauf ist sehr regelmäßig. Ich wache um sechs Uhr auf und dusche mich. Dann frühstücke ich schnell. Ich pendle mit dem Zug zur Arbeit. Um zwölf Uhr mache ich Mittagspause. Um 17 Uhr ist Feierabend. Abends gehe ich um 22 Uhr schlafen.',story_en:'My daily routine is very regular. I wake up at six, shower and have a quick breakfast. I commute by train to work. At twelve I take my lunch break. At 5pm work is over. In the evenings I go to bed at 10pm.',

   sents:[{g:'Wir buchen das Hotel online und fliegen nächsten Samstag.',e:'We are booking the hotel online and flying next Saturday.'},{g:'Am Strand liegen und die Sonne genießen ist entspannt.',e:'Lying on the beach and enjoying the sun is relaxing.'},{g:'Ich besuche gern Sehenswürdigkeiten.',e:'I like visiting tourist attractions.'}],
   story:'Diesen Sommer fahre ich nach Spanien. Ich habe das Hotel schon online gebucht. Am Flughafen muss ich früh sein. Ich packe meinen Koffer mit Kleidung und Sonnencreme. Am Strand möchte ich entspannt liegen. Urlaub macht mich immer erholt und glücklich.',story_en:'This summer I am going to Spain. I have already booked the hotel online. I have to be at the airport early. I pack my suitcase with clothes and sunscreen. On the beach I just want to relax. Holidays always make me feel refreshed and happy.',

   sents:[{g:'Ich trainiere dreimal pro Woche im Fitnessstudio.',e:'I train three times a week at the gym.'},{g:'Fußball ist in Deutschland sehr beliebt.',e:'Football is very popular in Germany.'},{g:'Regelmäßig laufen hält mich fit und gesund.',e:'Running regularly keeps me fit and healthy.'}],
   story:'Ich mache sehr gern Sport. Jeden Morgen laufe ich eine halbe Stunde durch den Park. Am Dienstag und Donnerstag trainiere ich im Fitnessstudio. Am Wochenende schwimme ich im Hallenbad. Mein Lieblingssport ist Fußball — meine Mannschaft ist die beste! Durch Sport bleibe ich fit und glücklich.',story_en:'I love sport. Every morning I run for half an hour through the park. On Tuesday and Thursday I train at the gym. At the weekend I swim. My favourite sport is football — my team is the best! Through sport I stay fit and happy.',

   sents:[{g:'Ich fühle große Freude, wenn ich meine Familie sehe.',e:'I feel great joy when I see my family.'},{g:'Sie hat Angst vor dem Vorstellungsgespräch.',e:'She is afraid of the job interview.'},{g:'Wir sind sehr glücklich über die guten Neuigkeiten.',e:'We are very happy about the good news.'}],
   story:'Emotionen sind ein wichtiger Teil des Lebens. Manchmal fühle ich große Freude — zum Beispiel wenn ich Freunde treffe. Manchmal habe ich auch Angst, besonders vor wichtigen Prüfungen. Wut kommt, wenn etwas unfair ist. Aber meistens bin ich glücklich und zufrieden.',story_en:'Emotions are an important part of life. Sometimes I feel great joy — for example when I meet friends. Sometimes I also feel fear, especially before important exams. Anger comes when something is unfair. But mostly I am happy and content.',
   sa:[{w:'sich freuen',t:'verb',e:'to be happy',syn:[{d:'jubeln',e:'to cheer'},{d:'genießen',e:'to enjoy'}],ant:[{d:'trauern',e:'to grieve'},{d:'weinen',e:'to cry'}]},{w:'glücklich',t:'adjective',e:'happy',syn:[{d:'zufrieden',e:'content'},{d:'fröhlich',e:'cheerful'}],ant:[{d:'unglücklich',e:'unhappy'},{d:'traurig',e:'sad'}]}]},

   sents:[{g:'Eine ausgewogene Ernährung ist wichtig für die Gesundheit.',e:'A balanced diet is important for health.'},{g:'Der Arzt hat mir ein Medikament verschrieben.',e:'The doctor has prescribed me a medication.'},{g:'Um gesund zu bleiben, ist regelmäßiger Sport wichtig.',e:'Regular exercise is important to stay healthy.'}],
   story:'Gesundheit ist das Wichtigste im Leben. Ich versuche, mich gesund zu ernähren — viel Obst, Gemüse und wenig Fleisch. Wenn ich Symptome wie Fieber bekomme, gehe ich sofort zum Arzt. Durch Sport und eine gute Lebensweise kann man viele Krankheiten verhindern.',story_en:'Health is the most important thing in life. I try to eat healthily — lots of fruit, vegetables and little meat. When I get symptoms like fever, I go to the doctor immediately. Through sport and a good lifestyle you can prevent many illnesses.',

   sents:[{g:'Der Klimawandel ist eine der größten Herausforderungen unserer Zeit.',e:'Climate change is one of the greatest challenges of our time.'},{g:'Durch Recycling können wir die Umwelt schützen.',e:'Through recycling we can protect the environment.'},{g:'Erneuerbare Energien sind wichtig für eine nachhaltige Zukunft.',e:'Renewable energies are important for a sustainable future.'}],
   story:'Die Umwelt zu schützen ist eine der wichtigsten Aufgaben unserer Generation. Der Klimawandel bedroht viele Tierarten. Durch Nachhaltigkeit und Recycling können wir etwas verändern. Erneuerbare Energien wie Solar- und Windkraft ersetzen langsam fossile Brennstoffe.',story_en:'Protecting the environment is one of the most important tasks of our generation. Climate change threatens many animal species. Through sustainability and recycling we can change things. Renewable energies are slowly replacing fossil fuels.',

   sents:[{g:'Ich habe meinen Lebenslauf aktualisiert und mich beworben.',e:'I have updated my CV and applied.'},{g:'Das Vorstellungsgespräch war schwierig, aber ich war gut vorbereitet.',e:'The interview was difficult, but I was well prepared.'},{g:'Weiterbildung ist wichtig, um in der Karriere voranzukommen.',e:'Further training is important to advance in one\'s career.'}],
   story:'Ich arbeite seit fünf Jahren in meiner Firma und möchte Karriere machen. Ich habe mich auf eine Führungsposition beworben. Ich habe meinen Lebenslauf überarbeitet und mich gut auf das Vorstellungsgespräch vorbereitet. Der Chef sagt, ich bin ambitioniert und zielstrebig. Jetzt muss ich über das Gehalt verhandeln.',story_en:'I have been working in my company for five years and want to advance my career. I applied for a management position. I revised my CV and prepared well for the interview. The boss says I am ambitious and goal-oriented. Now I have to negotiate the salary.',

   sents:[{g:'Um eine Sprache zu beherrschen, muss man regelmäßig Vokabeln lernen.',e:'To master a language, one must regularly learn vocabulary.'},{g:'Meine Aussprache verbessert sich durch viel Hören und Sprechen.',e:'My pronunciation improves through a lot of listening and speaking.'},{g:'Ich möchte Deutsch fließend sprechen können.',e:'I would like to be able to speak German fluently.'}],
   story:'Ich lerne Deutsch seit einem Jahr. Am Anfang war die Grammatik sehr schwierig. Jeden Tag lerne ich neue Vokabeln und übe die Aussprache. In meinem Sprachkurs helfen mir meine Lehrerin und meine Mitschüler. Mein Ziel ist es, Deutsch fließend zu beherrschen.',story_en:'I have been learning German for one year. At the beginning the grammar was very difficult. Every day I learn new vocabulary and practise pronunciation. In my language course my teacher and classmates help me. My goal is to master German fluently.',

   sents:[{g:'In einer Demokratie haben alle Bürger das Recht zu wählen.',e:'In a democracy all citizens have the right to vote.'},{g:'Das Parlament debattiert über neue Gesetze und Reformen.',e:'The parliament debates new laws and reforms.'},{g:'Die Opposition kritisiert die Regierungspolitik scharf.',e:'The opposition sharply criticises government policy.'}],
   story:'Die Bundesrepublik Deutschland ist eine parlamentarische Demokratie. Das Grundgesetz garantiert die Grundrechte aller Bürger. Alle vier Jahre wählen die Deutschen den Bundestag. Die stärkste Partei führt dann die Koalitionsverhandlungen. Das Parlament debattiert und verabschiedet Gesetze.',story_en:'The Federal Republic of Germany is a parliamentary democracy. The Basic Law guarantees the fundamental rights of all citizens. Every four years Germans elect the Bundestag. The strongest party then leads coalition negotiations. Parliament debates and passes laws.',

function resolveAll(nodes,cx,cy,iters){
  const pad=15;
  for(let it=0;it<iters;it++){
    for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      const ox=(a.w+b.w)/2+pad-Math.abs(a.x-b.x),oy=(a.h+b.h)/2+pad-Math.abs(a.y-b.y);
      if(ox>0&&oy>0){
        const dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||.001;
        const push=(Math.min(ox,oy)*.6)+1.5,nx=dx/d,ny=dy/d;
        const wa=a.isV?.45:1,wb=b.isV?.45:1;
        a.x+=nx*push*wa;a.y+=ny*push*wa;b.x-=nx*push*wb;b.y-=ny*push*wb;
        if(!a.isV){const dr=Math.sqrt((a.x-cx)**2+(a.y-cy)**2);if(dr<108){const sc=108/dr;a.x=cx+(a.x-cx)*sc;a.y=cy+(a.y-cy)*sc;}}
        if(!b.isV){const dr=Math.sqrt((b.x-cx)**2+(b.y-cy)**2);if(dr<108){const sc=108/dr;b.x=cx+(b.x-cx)*sc;b.y=cy+(b.y-cy)*sc;}}
      }
    }
  }
}

function buildSVG(data){
  const dark=isDark(),words=data.words.slice(0,14),n=words.length;
  const rng=mkRng(strH(data.topic)),cx=400,cy=285,MH=48,VH=32;
  const mSz=words.map(w=>{const lbl=w.a?w.a+' '+w.g:w.g;return{w:Math.min(Math.max(lbl.length*9.5+28,88),168),h:MH};});
  const mPos=words.map((w,i)=>{const ang=-Math.PI/2+(i/n)*2*Math.PI+(rng()-.5)*.22,r=168+mSz[i].w*.26+rng()*46;return{x:cx+r*Math.cos(ang),y:cy+r*Math.sin(ang),w:mSz[i].w,h:MH,isV:false,wi:i};});
  resolveAll(mPos,cx,cy,100);
  const all=[...mPos];
  words.forEach((w,i)=>{
    const mp=mPos[i],oa=Math.atan2(mp.y-cy,mp.x-cx);
    (w.v||[]).slice(0,4).forEach((vt,vi)=>{
      const vtd=typeof vt==='object'?(vt.d||''):String(vt),vte=typeof vt==='object'?(vt.e||''):'';
      const vbw=Math.min(Math.max(vtd.length*7.2+16,52),128);
      const spread=w.v.length>1?((vi-(w.v.length-1)/2)/w.v.length)*0.85:0;
      const va=oa+spread,vr=MH/2+VH/2+22+vi*3;
      all.push({x:mp.x+vr*Math.cos(va),y:mp.y+vr*Math.sin(va),w:vbw,h:VH,isV:true,wi:i,td:vtd,te:vte});
    });
  });
  resolveAll(all,cx,cy,80);
  let mnX=cx-130,mnY=cy-100,mxX=cx+130,mxY=cy+100;
  all.forEach(nd=>{mnX=Math.min(mnX,nd.x-nd.w/2-8);mnY=Math.min(mnY,nd.y-nd.h/2-8);mxX=Math.max(mxX,nd.x+nd.w/2+8);mxY=Math.max(mxY,nd.y+nd.h/2+8);});
  const pd=28,vx=mnX-pd,vy=mnY-pd,vw=mxX-mnX+pd*2,vh=mxY-mnY+pd*2;

function initZoom(svgId){
  const card=document.getElementById('wc-el'),svg=document.getElementById(svgId);if(!card||!svg)return;
  _z=1;_px=0;_py=0;
  const applyTx=()=>{svg.style.transform='translate('+_px+'px,'+_py+'px) scale('+_z+')';svg.style.transformOrigin='50% 50%';};
  card.addEventListener('wheel',e=>{e.preventDefault();_z=Math.min(4,Math.max(.35,_z+(e.deltaY>0?-.12:.12)));applyTx();},{passive:false});
  card.addEventListener('mousedown',e=>{_dr=true;_lx=e.clientX;_ly=e.clientY;});
  window.addEventListener('mousemove',e=>{if(!_dr)return;_px+=e.clientX-_lx;_py+=e.clientY-_ly;_lx=e.clientX;_ly=e.clientY;applyTx();});
  window.addEventListener('mouseup',()=>_dr=false);
  card.addEventListener('touchstart',e=>{if(e.touches.length===2)_pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);else{_lx=e.touches[0].clientX;_ly=e.touches[0].clientY;_dr=true;}},{passive:true});
  card.addEventListener('touchmove',e=>{if(e.touches.length===2){const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);_z=Math.min(4,Math.max(.35,_z*(nd/_pd)));_pd=nd;applyTx();}else if(_dr){_px+=e.touches[0].clientX-_lx;_py+=e.touches[0].clientY-_ly;_lx=e.touches[0].clientX;_ly=e.touches[0].clientY;applyTx();}},{passive:true});
  card.addEventListener('touchend',()=>_dr=false);
  window.resetZoom=()=>{_z=1;_px=0;_py=0;applyTx();};
  window.zoomIn=()=>{_z=Math.min(4,_z+.2);applyTx();};
  window.zoomOut=()=>{_z=Math.max(.35,_z-.2);applyTx();};
}

function shuffleSents(){
  if(!_data)return;
  const arr=[..._data.sents];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  document.getElementById('sent-list').innerHTML=arr.map(s=>'<div class="sent-card"><div class="sent-de">'+esc(s.g)+'</div><div class="sent-en">'+esc(s.e)+'</div></div>').join('');
}
function hlStory(txt,words){
  let r=esc(txt);const terms=[];words.forEach(w=>{terms.push(w.g);if(w.a)terms.push(w.a+' '+w.g);});
  terms.sort((a,b)=>b.length-a.length);
  terms.forEach(w=>{const re=new RegExp('(?<![\\wäöüÄÖÜß])('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')(?![\\wäöüÄÖÜß])','gi');r=r.replace(re,'<span class="hl">$1</span>');});
  return r;
}

let gs={correct:0,total:0};

  if(!sa||!sa.length)return'';

    (e.syn||[]).forEach((s,si)=>{chips.push({id:'s_'+ei+'_'+si,text:s.d,own:s.e||'',ei,tt:'syn'});gs.total++;});
    (e.ant||[]).forEach((s,si)=>{chips.push({id:'a_'+ei+'_'+si,text:s.d,own:s.e||'',ei,tt:'ant'});gs.total++;});
  });
  for(let i=chips.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[chips[i],chips[j]]=[chips[j],chips[i]];}
  const pool=chips.map(c=>'<div class="dc" id="chip_'+c.id+'" draggable="true" data-id="'+c.id+'" data-ei="'+c.ei+'" data-tt="'+c.tt+'" data-own="'+esc(c.own)+'" ondragstart="onDS(event)" ontouchstart="onTS(event)" ontouchmove="onTM(event)" ontouchend="onTE(event)">'+esc(c.text)+'</div>').join('');

function onTS(e){_did=e.currentTarget.dataset.id;_tc=e.currentTarget.cloneNode(true);_tc.style.cssText='position:fixed;opacity:.75;pointer-events:none;z-index:9999;transform:scale(1.1);';document.body.appendChild(_tc);const t=e.touches[0];_tc.style.left=(t.clientX-50)+'px';_tc.style.top=(t.clientY-20)+'px';}

function handleDrop(chipId,ei,type,dz){
  const chip=document.getElementById('chip_'+chipId);if(!chip||chip.classList.contains('placed'))return;
  const ok=(parseInt(chip.dataset.ei)===ei&&chip.dataset.tt===type);
  if(ok){chip.classList.add('placed');dz.innerHTML='';const lbl=document.createElement('div');lbl.className='chip-placed';lbl.textContent=chip.textContent;dz.appendChild(lbl);const own=chip.dataset.own||'';if(own){const m=document.createElement('div');m.className='dz-meaning';m.textContent='✓ '+own;dz.appendChild(m);}dz.classList.add('ok');gs.correct++;const sc=document.getElementById('gscore');if(sc){
    const pip=sc.querySelector('.score-pips');if(pip)pip.innerHTML=Array(gs.total).fill('').map((_,i)=>i<gs.correct?'&#9679;':'&#9711;').join('');
    if(gs.correct>=gs.total){

        b.innerHTML='<span>&#127881;</span><div><strong>Ausgezeichnet!</strong> All words placed correctly.</div><button class="go-btn" onclick="if(_data){const ts=chOf(CL);const ci=ts.findIndex(t=>t.id===_data.id);const nx=ts[ci+1];if(nx)loadTopic(nx.id);else resetHome();}" style="font-size:15px;padding:8px 18px">Next Topic &#8594;</button>';
        ga.appendChild(b);
      }
    }else{
      sc.textContent=gs.correct+' / '+gs.total;
    }
  }}
  else{dz.classList.add('bad');setTimeout(()=>dz.classList.remove('bad'),400);}
}

        +'</div>'
        +'<div class="story-col story-col-en">'
          +'<div class="story-col-hd">&#127468;&#127463; English</div>'
          +'<div class="story-en">'+esc(data.story_en)+'</div>'
        +'</div>'
      +'</div>'
    +'</div>'
  +'</div>'
    +'<div class="section-block word-block"><div class="sec-label-strip amber-strip"><span class="sec-label-icon">&#128218;</span><span class="sec-label-text">Wortliste &middot; Vocabulary Cards</span></div><div class="word-grid">'+wordH+'</div></div>'
    +saSection
    +'<div id="game-area">'+gameSection+'</div>'
    +explorerSection;

  setTimeout(()=>initZoom(id),80);
}


function launchConfetti(){
  const canvas=document.createElement('canvas');
  canvas.id='confetti-canvas';
  canvas.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const cols=['#7ec8ff','#3ecf70','#f5c842','#ff8060','#c0a0ff','#ff7070','#ffffff'];
  const particles=Array.from({length:160},(_,i)=>({
    x:Math.random()*canvas.width,y:-10-Math.random()*40,
    r:4+Math.random()*6,
    col:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*360,
    vx:(Math.random()-0.5)*4,
    vy:2+Math.random()*4,
    vr:(Math.random()-0.5)*8,
    shape:Math.random()<0.5?'rect':'circle',
    w:8+Math.random()*10,h:5+Math.random()*5
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.col;ctx.globalAlpha=Math.max(0,1-frame/200);
      if(p.shape==='rect'){ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);}
      else{ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.vy+=0.04;
    });
    frame++;
    if(frame<220)requestAnimationFrame(draw);
    else{canvas.remove();}
  }
  draw();
}


/* ──────────────────────────────────────────────────────────────
   AI TOPIC GENERATOR — Claude API fallback
   Flow: user searches unknown topic → generateWithAI() called
   → shows loading UI → calls Claude API → parses JSON response
   → caches in localStorage → renders with renderTopic()
────────────────────────────────────────────────────────────── */

const CACHE_PREFIX = 'wg_topic_v1_';
const SYSTEM_PROMPT = `You are a German language curriculum expert. Generate a complete German vocabulary topic package in strict JSON format.
The JSON must exactly match this schema — no extra keys, no markdown, no explanation, ONLY the JSON object:
{
  "id": "string (lowercase_underscore, topic_level format)",
  "level": "A1|A2|B1|B2",
  "topic": "string (German topic name, Title Case)",
  "chapter": "string (level · Topic Category, e.g. 'A2 · Food & Culture')",
  "keys": ["array", "of", "5-8", "search", "keywords", "lowercase"],
  "words": [
    {
      "g": "German word (with Umlaut if needed)",
      "e": "English translation",
      "t": "noun|verb|adjective|phrase",
      "a": "der|die|das|null (null for verbs/adjectives)",
      "v": [{"d": "related German form", "e": "English"}]
    }
  ],
  "sents": [
    {"g": "German example sentence", "e": "English translation"}
  ],
  "story": "A short German paragraph (4-6 sentences) using the vocabulary words naturally",
  "story_en": "English translation of the story paragraph",
  "sa": [
    {
      "w": "German word",
      "t": "verb|adjective",
      "syn": [{"d": "German synonym", "e": "English"}],
      "ant": [{"d": "German antonym", "e": "English"}]
    }
  ]
}
Rules:
- words: exactly 15-20 entries mixing nouns, verbs, adjectives
- Each word must have 3-5 related forms in "v" array
- sents: exactly 6 natural example sentences using the words
- story: 4-6 sentences, use at least 8 of the vocabulary words naturally
- sa: 4-6 entries (verbs and adjectives only, not nouns) with synonyms AND antonyms
- All content must match the specified CEFR level
- Return ONLY the JSON. No markdown. No backticks. No explanation.`;

function getApiKey(){
  return localStorage.getItem('wg_api_key')||'';
}

function saveApiKey(){
  const inp = document.getElementById('api-key-inp');
  const key = (inp.value||'').trim();
  if(!key){alert('Please paste your Anthropic API key first.');return;}
  if(!key.startsWith('sk-ant')){alert('That does not look like an Anthropic API key (should start with sk-ant...)');return;}
  localStorage.setItem('wg_api_key', key);
  inp.value = '';
  updateApiBar();
}

function updateApiBar(){
  const key = getApiKey();
  const status = document.getElementById('api-status');
  const inp = document.getElementById('api-key-inp');
  if(!status) return;
  if(key){
    status.textContent = '✓ Key saved';
    status.className = 'api-status set';
    if(inp) inp.placeholder = 'Key saved — click Save Key to change';
  } else {
    status.textContent = 'Not set';
    status.className = 'api-status unset';
    if(inp) inp.placeholder = 'sk-ant-api03-...';
  }
}

function showAiLoading(topic){
  const steps = [
    {icon:'🧠', label:'Reading your topic request'},
    {icon:'📖', label:'Selecting vocabulary for '+CL+' level'},
    {icon:'✍️', label:'Writing example sentences & story'},
    {icon:'🔗', label:'Building synonyms & antonym pairs'},
    {icon:'✨', label:'Formatting the word galaxy data'},
  ];
  const stepsHtml = steps.map((s,i)=>
    `<div class="ai-step" id="ai-step-${i}"><span class="ai-step-icon">${s.icon}</span>${s.label}</div>`
  ).join('');
  document.getElementById('root').innerHTML =
    `<div class="ai-loading">
      <div class="ai-spinner"></div>
      <div class="ai-loading-title">Generating "${topic}"</div>
      <div class="ai-loading-sub">Claude is building a complete ${CL} vocabulary set — words, sentences, a story, synonyms and antonyms.</div>
      <div class="ai-loading-steps">${stepsHtml}</div>
    </div>`;
  // Animate steps sequentially
  let i = 0;
  function tick(){
    if(i>0) document.getElementById('ai-step-'+(i-1))?.classList.replace('active','done');
    const el = document.getElementById('ai-step-'+i);
    if(el){ el.classList.add('active'); i++; setTimeout(tick, 1800); }
  }
  tick();
}

async function generateWithAI(rawQuery){
  const key = getApiKey();
  if(!key){
    showNoKeyMessage(rawQuery);
    return;
  }

  // Check localStorage cache first
  const cacheKey = CACHE_PREFIX + CL + '_' + rawQuery.toLowerCase().replace(/\s+/g,'_');
  const cached = localStorage.getItem(cacheKey);
  if(cached){
    try{
      const data = JSON.parse(cached);
      data._cached = true;
      renderTopic(data);
      return;
    }catch(e){ localStorage.removeItem(cacheKey); }
  }

  showAiLoading(rawQuery);

  const userPrompt = `Generate a complete German vocabulary topic package for CEFR level ${CL}.
Topic: "${rawQuery}"
The topic should be suitable for ${CL} learners. Make the vocabulary, sentences, and story match ${CL} difficulty.
Return ONLY the JSON object — no markdown, no backticks, no explanation.`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        system: SYSTEM_PROMPT,
        messages:[{role:'user', content: userPrompt}]
      })
    });

    if(!res.ok){
      const err = await res.json().catch(()=>({error:{message:res.statusText}}));
      throw new Error(err?.error?.message || 'API error '+res.status);
    }

    const data = await res.json();
    const raw = data.content?.[0]?.text || '';

    // Parse JSON — strip any accidental markdown fences
    const cleaned = raw.replace(/^```json?\s*/,'').replace(/\s*```$/,'').trim();
    const topic = JSON.parse(cleaned);

    // Validate required fields
    if(!topic.words || !topic.sents || !topic.story){
      throw new Error('Response missing required fields');
    }

    // Tag as AI generated
    topic._aiGenerated = true;

    // Cache in localStorage
    try{ localStorage.setItem(cacheKey, JSON.stringify(topic)); }
    catch(e){ /* storage full — skip cache */ }

    // Add to live DB so findTopic works for the session
    if(!DB.find(t=>t.id===topic.id)) DB.push(topic);

    renderTopic(topic);

  } catch(err){
    showAiError(rawQuery, err.message);
  }
}

function showNoKeyMessage(query){
  document.getElementById('root').innerHTML =
    `<div class="state">
      <svg class="state-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M36 20h-4v-4a8 8 0 0 0-16 0v4H12a2 2 0 0 0-2 2v18a2 2 0 0 0 2 2h24a2 2 0 0 0 2-2V22a2 2 0 0 0-2-2zm-10 10v4h-4v-4a2 2 0 1 1 4 0zm-6-10v-4a4 4 0 0 1 8 0v4H20z"/>
      </svg>
      <p>"${esc(query)}" is not in the built-in database yet
        <small>Add your Anthropic API key above to generate any topic instantly.<br>
        Your key stays in your browser — never sent to our servers.</small>
      </p>
      <div class="nf-grid">
        ${chOf(CL).slice(0,8).map(t=>`<div class="nf-card" onclick="loadTopic('${t.id}')"><div class="nf-lv">${t.level}</div><div class="nf-t">${t.topic}</div></div>`).join('')}
      </div>
    </div>`;
}

function showAiError(query, errMsg){
  document.getElementById('root').innerHTML =
    `<div class="state">
      <svg class="state-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="24" cy="24" r="20"/><line x1="24" y1="14" x2="24" y2="26"/><circle cx="24" cy="32" r="1.5" fill="currentColor"/>
      </svg>
      <p>Couldn't generate "${esc(query)}"
        <small>${esc(errMsg)}<br>Check your API key or try again.</small>
      </p>
      <div style="margin-top:1rem">
        <button class="go-btn" onclick="generateWithAI('${esc(query)}')" style="font-size:15px;padding:9px 22px">&#8634; Try Again</button>
      </div>
    </div>`;
}

/* Patch renderTopic to show AI/cached badge */
const _origRenderTopic = renderTopic;
renderTopic = function(data){
  _origRenderTopic(data);
  // Add badge after render
  const sub = document.querySelector('.result-sub');
  if(sub && data._aiGenerated && !sub.querySelector('.ai-badge')){
    const badge = document.createElement('span');
    badge.className = data._cached ? 'cached-badge' : 'ai-badge';
    badge.innerHTML = data._cached ? '&#9889; Cached' : '&#10024; AI Generated';
    sub.appendChild(badge);
  }
};

// Boot: load saved key status + show cached topic count
updateApiBar();
const cachedCount = Object.keys(localStorage).filter(k=>k.startsWith(CACHE_PREFIX)).length;
if(cachedCount > 0){
  const statusEl = document.getElementById('api-status');
  if(statusEl && getApiKey()){
    statusEl.textContent = `✓ Key saved · ${cachedCount} topic${cachedCount>1?'s':''} cached`;
  }
}
